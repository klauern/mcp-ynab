name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Release merged PR
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      should_release: ${{ steps.release-level.outputs.should_release }}
    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false

      - name: Determine release level
        id: release-level
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const releaseLevel = require("./.github/scripts/release_level.cjs");
            await releaseLevel({ context, core });

      - name: Checkout main
        if: steps.release-level.outputs.should_release == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        if: steps.release-level.outputs.should_release == 'true'
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.release-level.outputs.should_release == 'true'
        run: uv python install 3.12

      - name: Bump version
        if: steps.release-level.outputs.should_release == 'true'
        id: bump
        run: python .github/scripts/bump_version.py "${{ steps.release-level.outputs.level }}"

      - name: Update lockfile
        if: steps.release-level.outputs.should_release == 'true'
        run: uv lock

      - name: Commit version bump
        if: steps.release-level.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "chore(release): v${{ steps.bump.outputs.next_version }} [skip ci]"

      - name: Run quality gates
        if: steps.release-level.outputs.should_release == 'true'
        run: |
          uv sync --all-extras --dev
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/
          uv run interrogate src/mcp_ynab
          uv run pytest

      - name: Build package
        if: steps.release-level.outputs.should_release == 'true'
        run: uv build

      - name: Upload distributions
        if: steps.release-level.outputs.should_release == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-distributions
          path: dist/

      - name: Push version commit and tag
        if: steps.release-level.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub release
        if: steps.release-level.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" dist/* \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes

  publish:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
