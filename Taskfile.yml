# https://taskfile.dev

version: "3"

vars:
  GREETING: Hello, World!

tasks:
  mcp-dev:
    desc: "Run the MCP server in development mode"
    cmds:
      - uv run mcp dev src/mcp_ynab/server.py

  open-browser:
    desc: "Open the browser"
    cmds:
      - sleep 2 && open http://localhost:5173

  dev:
    desc: "Run the MCP server in development mode and open the browser"
    deps:
      - mcp-dev
      - open-browser

  deps:
    desc: "Synchronize dependencies"
    cmds:
      - uv sync
      - npm install --global @modelcontextprotocol/inspector

  install:
    desc: "Install the package locally"
    cmds:
      - uv sync
      - uv pip install .
      - echo "installed mcp-ynab at $(which mcp-ynab)"

  test:
    desc: "Run the tests"
    cmds:
      - uv run pytest

  test:integration:
    desc: "Run the integration tests"
    cmds:
      - uv run pytest -m "integration"

  test:all:
    desc: "Run all tests including integration tests"
    cmds:
      - uv run pytest -m ""

  coverage:
    desc: "Run tests with coverage reporting"
    cmds:
      - uv run pytest --cov=src/mcp_ynab --cov-report=term-missing --cov-report=html -m ""

  fmt:
    desc: "Format and lint code"
    cmds:
      - uv run ruff format src/ tests/
      - uv run ruff check src/ tests/ --fix

  lint:
    desc: "Lint code without auto-fix"
    cmds:
      - uv run ruff check src/ tests/
      - uv run ruff format --check src/ tests/

  typecheck:
    desc: "Run mypy type checking"
    cmds:
      - uv run mypy src/mcp_ynab

  docstrings:
    desc: "Check docstring coverage (fails under 80%)"
    cmds:
      - uv run interrogate src/mcp_ynab
